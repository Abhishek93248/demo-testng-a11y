name: 'BrowserStack TestNG Accessibility Tests'

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  browserstack-test:
    name: 'Run TestNG tests on BrowserStack'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ✅ Checkout repository first
      - name: 'Checkout the repository'
        uses: actions/checkout@v4

      # ✅ Setup BrowserStack credentials
      - name: 'Setup BrowserStack Env'
        uses: browserstack/github-actions/setup-env@master
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # ✅ Set up JDK
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # ✅ Run TestNG tests
      - name: 'Run TestNG tests on BrowserStack'
        run: mvn -B clean test -fae
        env:
          MAVEN_OPTS: -Dmaven.test.failure.ignore=false -Dmaven.wagon.http.retryHandler.count=3

      # ✅ Archive full TestNG reports
      - name: 'Archive Test Reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/**

      # ✅ Parse test results and update GitHub Summary
      - name: 'Generate Accessibility Test Summary'
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "⚠️ TestNG report not found." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          FAILED=$(xmllint --xpath "string(/testng-results/@failed)" $REPORT_FILE 2>/dev/null || echo 0)
          PASSED=$(xmllint --xpath "string(/testng-results/@passed)" $REPORT_FILE 2>/dev/null || echo 0)
          SKIPPED=$(xmllint --xpath "string(/testng-results/@skipped)" $REPORT_FILE 2>/dev/null || echo 0)

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ **Accessibility Check Failed**" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Accessibility Check Passed**" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi
